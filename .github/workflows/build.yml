name: Build Tweak

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Theos Dependencies
        run: brew install ldid xz

      - name: Setup Theos Framework
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          mkdir -p $HOME/theos/sdks
          curl -LO https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz || curl -LO https://github.com/xybp888/iOS-SDKs/raw/master/iPhoneOS14.5.sdk.tar.xz
          tar -xf iPhoneOS14.5.sdk.tar.xz -C $HOME/theos/sdks
          rm iPhoneOS14.5.sdk.tar.xz
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Compile Dylib
        run: |
          export THEOS=$HOME/theos
          make package FINALPACKAGE=1
        
      - name: Upload Finished Dylib
        uses: actions/upload-artifact@v4
        with:
          name: CosmosKeyAuth-Dylib
          path: .theos/obj/debug/*.dylib
